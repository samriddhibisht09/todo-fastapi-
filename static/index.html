<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: min(840px, 100%);
            margin: 24px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .header {
            padding: 32px 32px 24px;
            border-bottom: 1px solid #e5e7eb;
        }

        .header h1 {
            margin: 0;
            font-size: 34px;
            color: #111827;
        }

        .header p {
            margin: 8px 0 0;
            color: #6b7280;
            font-size: 16px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding: 32px;
        }

        .panel {
            background: #f8fafc;
            border-radius: 20px;
            padding: 24px;
        }

        .panel h2 {
            margin: 0 0 16px;
            font-size: 22px;
            color: #111827;
        }

        .field {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }

        .field label {
            color: #374151;
            font-weight: 600;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            background: white;
        }

        .button-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .button-row button {
            flex: 1;
            min-width: 140px;
            padding: 14px 18px;
            font-size: 15px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        .button-row button.secondary {
            background: #f3f4f6;
            color: #111827;
        }

        .error {
            color: #dc2626;
            margin-bottom: 16px;
            min-height: 22px;
        }

        .todo-controls {
            display: grid;
            gap: 16px;
            margin-bottom: 20px;
        }

        .todo-controls input,
        .todo-controls button {
            width: 100%;
        }

        .todo-controls input {
            border-radius: 12px;
            border: 1px solid #d1d5db;
            padding: 14px 16px;
            font-size: 15px;
        }

        .todo-controls button {
            background: #22c55e;
            color: white;
            font-weight: 700;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 14px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            background: white;
        }

        .todo-item.completed {
            background: #ecfdf5;
        }

        .todo-item.completed .task {
            text-decoration: line-through;
            color: #4b5563;
        }

        .task {
            margin: 0;
            font-size: 16px;
            color: #111827;
            flex: 1;
            word-break: break-word;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .actions button {
            padding: 10px 14px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }

        .complete-button {
            background: #22c55e;
            color: white;
        }

        .delete-button {
            background: #ef4444;
            color: white;
        }

        .hidden {
            display: none;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .status-row div {
            color: #374151;
        }

        .logout-button {
            background: #ef4444;
        }

        @media (max-width: 980px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Todo App</h1>
            <p>Sign up or log in to manage your personal todo list.</p>
        </div>

        <div class="content">
            <div class="panel" id="authPanel">
                <h2 id="authTitle">Login</h2>
                <div id="authError" class="error"></div>

                <div class="field">
                    <label for="emailInput">Email</label>
                    <input id="emailInput" type="email" placeholder="you@example.com" />
                </div>

                <div class="field hidden" id="phoneField">
                    <label for="phoneInput">Phone Number</label>
                    <input id="phoneInput" type="text" placeholder="123-456-7890" />
                </div>

                <div class="field">
                    <label for="passwordInput">Password</label>
                    <input id="passwordInput" type="password" placeholder="Password" />
                </div>

                <div class="button-row">
                    <button id="authActionButton">Login</button>
                    <button class="secondary" id="toggleAuthButton">Switch to Sign Up</button>
                </div>
            </div>

            <div class="panel hidden" id="todoPanel">
                <div class="status-row">
                    <div>
                        <strong id="welcomeText"></strong>
                    </div>
                    <button class="logout-button" id="logoutButton">Logout</button>
                </div>
                <div class="error" id="todoError"></div>
                <div class="todo-controls">
                    <input id="taskInput" type="text" placeholder="Add a new task" />
                    <button id="addButton">Add Todo</button>
                </div>
                <ul id="todoList" class="todo-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const api = {
            login: "/login",
            signup: "/signup",
            user: "/users/me",
            todos: "/todos",
        };

        const tokenKey = "todo_access_token";
        const authTitle = document.getElementById("authTitle");
        const authPanel = document.getElementById("authPanel");
        const todoPanel = document.getElementById("todoPanel");
        const authError = document.getElementById("authError");
        const todoError = document.getElementById("todoError");
        const emailInput = document.getElementById("emailInput");
        const phoneField = document.getElementById("phoneField");
        const phoneInput = document.getElementById("phoneInput");
        const passwordInput = document.getElementById("passwordInput");
        const authActionButton = document.getElementById("authActionButton");
        const toggleAuthButton = document.getElementById("toggleAuthButton");
        const addButton = document.getElementById("addButton");
        const taskInput = document.getElementById("taskInput");
        const todoList = document.getElementById("todoList");
        const welcomeText = document.getElementById("welcomeText");
        const logoutButton = document.getElementById("logoutButton");

        let isSignup = false;
        let currentUser = null;

        function getToken() {
            return window.localStorage.getItem(tokenKey);
        }

        function setToken(token) {
            window.localStorage.setItem(tokenKey, token);
        }

        function clearToken() {
            window.localStorage.removeItem(tokenKey);
        }

        function authHeaders() {
            const token = getToken();
            return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function showPanel(panel) {
            authPanel.classList.toggle("hidden", panel !== "auth");
            todoPanel.classList.toggle("hidden", panel !== "todo");
        }

        function setError(element, message) {
            element.textContent = message || "";
        }

        function getJson(response) {
            return response.json().catch(() => ({}));
        }

        function getErrorMessage(data) {
            if (!data) return "Request failed";
            if (typeof data.detail === "string") return data.detail;
            if (Array.isArray(data.detail)) {
                return data.detail
                    .map(item => item.msg || JSON.stringify(item))
                    .join("; ");
            }
            if (typeof data.error === "string") return data.error;
            if (typeof data.detail === "object") return JSON.stringify(data.detail);
            return "Request failed";
        }

        async function request(url, options = {}) {
            const headers = { "Content-Type": "application/json", ...options.headers };
            const response = await fetch(url, { ...options, headers });
            const data = await getJson(response);
            if (!response.ok) {
                throw new Error(getErrorMessage(data));
            }
            return data;
        }

        async function authRequest(url, options = {}) {
            const headers = {
                "Content-Type": "application/json",
                ...authHeaders(),
                ...(options.headers || {})
            };

            const response = await fetch(url, {
                ...options,
                headers
            });

            const data = await getJson(response);

            if (response.status === 401) {
                logout();
                throw new Error("Session expired. Please log in again.");
            }

            if (!response.ok) {
                throw new Error(getErrorMessage(data));
            }

            return data;
        }

        async function switchToSignup() {
            isSignup = true;
            authTitle.textContent = "Sign Up";
            authActionButton.textContent = "Create account";
            toggleAuthButton.textContent = "Switch to Login";
            phoneField.classList.remove("hidden");
            authError.textContent = "";
        }

        async function switchToLogin() {
            isSignup = false;
            authTitle.textContent = "Login";
            authActionButton.textContent = "Login";
            toggleAuthButton.textContent = "Switch to Sign Up";
            phoneField.classList.add("hidden");
            authError.textContent = "";
        }

        async function populateUserInfo() {
            try {
                const user = await authRequest(api.user, { method: "GET" });
                currentUser = user;
                welcomeText.textContent = `Hello, ${user.email}`;
            } catch (error) {
                currentUser = null;
            }
        }

        async function loadTodos() {
            todoList.innerHTML = "";
            setError(todoError, "");
            try {
                const todos = await authRequest(api.todos, { method: "GET" });
                if (!Array.isArray(todos)) {
                    throw new Error("Unexpected response from server.");
                }
                if (todos.length === 0) {
                    const emptyItem = document.createElement("li");
                    emptyItem.className = "todo-item";
                    emptyItem.textContent = "No todos yet. Add one!";
                    todoList.appendChild(emptyItem);
                    return;
                }
                todos.forEach(todo => {
                    const item = document.createElement("li");
                    item.className = `todo-item${todo.completed ? " completed" : ""}`;

                    const taskText = document.createElement("p");
                    taskText.className = "task";
                    taskText.textContent = todo.task;

                    const actions = document.createElement("div");
                    actions.className = "actions";

                    const completeButton = document.createElement("button");
                    completeButton.className = "complete-button";
                    completeButton.textContent = todo.completed ? "Undo" : "Complete";
                    completeButton.addEventListener("click", async () => {
                        try {
                            await authRequest(`${api.todos}/${todo.id}`, {
                                method: "PUT",
                                body: JSON.stringify({ task: todo.task, completed: !todo.completed }),
                            });
                            await loadTodos();
                        } catch (error) {
                            setError(todoError, error.message);
                        }
                    });

                    const deleteButton = document.createElement("button");
                    deleteButton.className = "delete-button";
                    deleteButton.textContent = "Delete";
                    deleteButton.addEventListener("click", async () => {
                        try {
                            await authRequest(`${api.todos}/${todo.id}`, { method: "DELETE" });
                            await loadTodos();
                        } catch (error) {
                            setError(todoError, error.message);
                        }
                    });

                    actions.appendChild(completeButton);
                    actions.appendChild(deleteButton);
                    item.appendChild(taskText);
                    item.appendChild(actions);
                    todoList.appendChild(item);
                });
            } catch (error) {
                setError(todoError, error.message);
            }
        }

        async function authAction() {
            setError(authError, "");
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const phone_number = phoneInput.value.trim();

            if (!email || !password || (isSignup && !phone_number)) {
                setError(authError, "Please fill in all required fields.");
                return;
            }

            try {
                const data = isSignup
                    ? await request(api.signup, {
                        method: "POST",
                        body: JSON.stringify({ email, password, phone_number }),
                    })
                    : await request(api.login, {
                        method: "POST",
                        body: JSON.stringify({ email, password }),
                    });

                if (isSignup) {
                    setError(authError, "Account created successfully. Please log in.");
                    await switchToLogin();
                    return;
                }

                setToken(data.access_token);
                await populateUserInfo();
                await loadTodos();
                showPanel("todo");
            } catch (error) {
                setError(authError, error.message);
            }
        }

        async function addTodo() {
            setError(todoError, "");
            const task = taskInput.value.trim();
            if (!task) {
                setError(todoError, "Task cannot be empty.");
                return;
            }
            addButton.disabled = true;
            try {
                await authRequest(api.todos, {
                    method: "POST",
                    body: JSON.stringify({ task }),
                });
                taskInput.value = "";
                await loadTodos();
            } catch (error) {
                setError(todoError, error.message);
            } finally {
                addButton.disabled = false;
            }
        }

        function logout() {
            clearToken();
            currentUser = null;
            setError(authError, "");
            setError(todoError, "");
            showPanel("auth");
        }

        toggleAuthButton.addEventListener("click", () => {
            if (isSignup) {
                switchToLogin();
            } else {
                switchToSignup();
            }
        });

        authActionButton.addEventListener("click", authAction);
        addButton.addEventListener("click", addTodo);
        logoutButton.addEventListener("click", logout);

        async function init() {
            if (getToken()) {
                try {
                    await populateUserInfo();
                    await loadTodos();
                    if (currentUser) {
                        showPanel("todo");
                        return;
                    }
                } catch (error) {
                    clearToken();
                }
            }
            switchToLogin();
            showPanel("auth");
        }

        init();
    </script>
</body>

</html>
